<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Fetch Assignment</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  </head>
  <body>
    
    <section class="bg-[#A95C68] mt-[50px] mb-[50px] mx-[20px] h-[300px] rounded-md">
    <h2 class="flex justify-center font-medium text-[30px] text-[#ffffff] pt-[20px]">Countdown to launch</h2>
    <p class="flex justify-center font-medium text-[16px] px-[30px] text-white " id="countDown"></p>
    <div class="w-[80%] md:w-[60%] lg:w-[80%] m-auto ">
      <input id="searchProduct" onkeyup="filterProducts()"
        class="w-full h-[50px] outline-none  border-[#ffffff] text-white text-[10px] lg:text-[15px] border-1 p-4 rounded-full mt-[50px]"
        type="text"
        placeholder="Search for your favourite product"
        
      />
    </div>
    </section>
    <section id="pageSection" class="grid grid-cols-1 lg:grid-cols-3 md:grid-cols-2 gap-4 mt-[50px] mb-[50px] mx-[20px]"></section>
    <p id="noProduct" class="hidden bg-[#A95C68] p-4 text-white text-center font-bold w-[60%] lg:w-[30%] m-auto h-[50px] rounded-lg">Product Not Found</p>
    <p id="errorMessage"></p>
    <script src="fetch-ass.js"></script>
  </body>
</html>
